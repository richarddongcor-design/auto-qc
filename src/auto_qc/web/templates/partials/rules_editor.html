<div class="editor-section">
  <form id="rule-set-form" hx-post="/config/rule-sets/{{ name }}/save" hx-target="#rule-save-status" hx-swap="innerHTML">
    <input type="hidden" name="name" value="{{ name }}">
    <div class="form-grid mb-5">
      <div class="form-group">
        <label class="field-label">显示名称</label>
        <input name="display_name" value="{{ data.display_name }}" class="input">
      </div>
      <div class="form-group">
        <label class="field-label">标识</label>
        <input value="{{ name }}" class="input input--disabled" disabled>
      </div>
      <div class="form-group form-group--full">
        <label class="field-label">描述</label>
        <textarea name="description" rows="2" class="textarea">{{ data.description }}</textarea>
      </div>
    </div>

    <!-- 规则列表 -->
    <div id="rules-container">
      {% for rule in data.rules %}
      <div class="rule-card">
        <div class="rule-card-header">
          <span class="rule-card-id">{{ rule.rule_id }}</span>
          <button type="button" class="btn-remove" onclick="this.closest('.rule-card').remove()">✕ 删除</button>
        </div>
        <div class="form-group mb-4">
          <label class="field-label">规则名称</label>
          <input name="rule_name_{{ loop.index0 }}" value="{{ rule.name }}" class="input">
        </div>
        <div class="form-group mb-4">
          <label class="field-label">描述</label>
          <textarea name="rule_desc_{{ loop.index0 }}" rows="2" class="textarea">{{ rule.description }}</textarea>
        </div>
        <div class="form-group">
          <label class="field-label">检测逻辑</label>
          <textarea name="rule_logic_{{ loop.index0 }}" rows="3" class="textarea" style="font-family:'SF Mono','Fira Code',monospace;font-size:13px;">{{ rule.detection_logic }}</textarea>
        </div>
      </div>
      {% endfor %}
    </div>

    <input type="hidden" name="rules_json" id="rules-json-input">

    <div class="editor-actions mt-4">
      <button type="button" onclick="addRule()" class="btn-add">+ 添加规则</button>
      <button type="button" onclick="saveRuleSet()" class="btn-save">保存规则集</button>
    </div>
    <div id="rule-save-status" class="mt-3"></div>
  </form>
</div>

<script>
function saveRuleSet() {
  const container = document.getElementById('rules-container');
  const cards = container.querySelectorAll('.rule-card');
  const rules = [];
  cards.forEach(function(card, idx) {
    var name = card.querySelector('[name^="rule_name_"]').value;
    var desc = card.querySelector('[name^="rule_desc_"]').value;
    var logic = card.querySelector('[name^="rule_logic_"]').value;
    var idSpan = card.querySelector('.rule-card-id');
    rules.push({
      rule_id: idSpan ? idSpan.textContent.trim() : 'R' + String(idx + 1).padStart(2, '0'),
      name: name,
      description: desc,
      detection_logic: logic,
    });
  });
  rules.forEach(function(r, i) { r.rule_id = 'R' + String(i + 1).padStart(2, '0'); });
  document.getElementById('rules-json-input').value = JSON.stringify(rules);
  document.getElementById('rule-set-form').dispatchEvent(new Event('submit', {cancelable: true}));
}
function addRule() {
  const container = document.getElementById('rules-container');
  const count = container.querySelectorAll('.rule-card').length;
  const idx = 'new_' + Date.now();
  const html = '<div class="rule-card">' +
    '<div class="rule-card-header">' +
      '<span class="rule-card-id">R' + String(count + 1).padStart(2, '0') + '</span>' +
      '<button type="button" class="btn-remove" onclick="this.closest(\'.rule-card\').remove()">✕ 删除</button>' +
    '</div>' +
    '<div class="form-group mb-4"><label class="field-label">规则名称</label><input name="rule_name_' + idx + '" value="" class="input"></div>' +
    '<div class="form-group mb-4"><label class="field-label">描述</label><textarea name="rule_desc_' + idx + '" rows="2" class="textarea"></textarea></div>' +
    '<div class="form-group"><label class="field-label">检测逻辑</label><textarea name="rule_logic_' + idx + '" rows="3" class="textarea" style="font-family:\'SF Mono\',\'Fira Code\',monospace;font-size:13px;"></textarea></div>' +
  '</div>';
  container.insertAdjacentHTML('beforeend', html);
}
</script>
