<div id="progress-{{ task_id }}"
     {% if not task or task.status == "running" %}
     hx-get="/qc/progress/{{ task_id }}" hx-trigger="every 3s" hx-swap="outerHTML"
     {% endif %}>
  {% if not task or task.status == "running" %}
  <div class="card p-10 mb-4 flex flex-col items-center justify-center gap-5">
    <span class="inline-flex items-center px-3 py-1 rounded-md text-sm font-medium bg-amber-50 text-amber-600">质检中</span>
    <div class="w-48 h-1.5 bg-gray-100 rounded-full overflow-hidden">
      <div class="h-full bg-amber-500 rounded-full animate-pulse" style="width: 60%"></div>
    </div>
    <div class="text-xs text-gray-400">正在运行，请稍候...</div>
  </div>
  {% elif task.status == "completed" %}
  <div hx-get="/qc/result/{{ task_id }}" hx-trigger="load" hx-swap="outerHTML"></div>
  {% elif task.status == "failed" %}
  <div class="card p-6 mb-4">
    <div class="flex items-center gap-3 mb-3">
      <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-red-50 text-red-600">运行失败</span>
      <span class="text-sm font-medium">{{ task_id }}</span>
    </div>
    <div class="text-sm text-red-500">{{ task.error }}</div>
  </div>
  {% endif %}
</div>
