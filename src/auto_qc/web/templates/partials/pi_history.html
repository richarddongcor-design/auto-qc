{% if runs %}
<div class="divide-y divide-gray-50">
  {% for run in runs %}
  <div class="flex items-center justify-between py-3">
    <div class="flex items-center gap-3 min-w-0">
      <span class="text-sm text-gray-900 truncate">{{ run.data_file.split('/')[-1] or run.data_file }}</span>
      <span class="text-xs text-gray-300 flex-shrink-0">{{ run.id[:8] }}</span>
    </div>
    <div class="flex items-center gap-4 flex-shrink-0 ml-4">
      <span class="text-xs {{ 'text-emerald-500' if run.status == 'completed' else 'text-red-500' }}">
        {% if run.status == "completed" %}成功{% else %}失败{% endif %}
      </span>
      <a href="/pi/download/{{ run.id }}" class="text-xs text-amber-600 hover:text-amber-700 font-medium no-underline">下载</a>
      <button onclick="if(confirm('确认删除？')){fetch('/pi/history/delete/{{ run.id }}',{method:'POST'}).then(function(){location.reload()});}" class="text-xs text-gray-300 hover:text-red-500 transition-colors cursor-pointer bg-transparent border-none p-0">✕</button>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="text-sm text-gray-400 py-6 text-center">暂无历史记录</div>
{% endif %}
