{% if runs %}
<div class="divide-y divide-gray-50">
  {% for run in runs %}
  <div class="flex items-center justify-between py-3">
    <div class="flex items-center gap-3 min-w-0">
      <span class="text-sm text-gray-900 truncate">{{ run.data_file }}</span>
      <span class="text-xs text-gray-300 flex-shrink-0">{{ run.domain }}</span>
    </div>
    <div class="flex items-center gap-4 flex-shrink-0 ml-4">
      <span class="text-xs {% if run.status == 'completed' %}text-emerald-500{% else %}text-red-500{% endif %}">
        {{ "成功" if run.status == "completed" else "失败" }}
      </span>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="text-sm text-gray-400 py-4 text-center">暂无历史记录</div>
{% endif %}
