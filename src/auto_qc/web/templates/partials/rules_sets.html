<!-- 新建按钮 -->
<button onclick="showNewRuleSetDialog()" class="btn-dashed mb-3">
  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
  新建规则集
</button>

<!-- 从 markdown 导入 -->
<button onclick="showImportDialog()" class="btn-dashed btn-dashed--sm">
  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
  从 Markdown 导入
</button>

{% for rs in rule_sets %}
<div class="rule-item">
  <div class="rule-item-left"
       onclick="closeEditor(); document.getElementById('rule-editor').innerHTML='<div class=\\'empty-state\\'>加载中...</div>'"
       hx-get="/config/rule-sets/{{ rs.name }}"
       hx-target="#rule-editor"
       hx-swap="innerHTML">
    <span class="rule-item-name">{{ rs.display_name }}</span>
    <span class="rule-item-count">{{ rs.rule_count }} 条规则</span>
  </div>
  <div class="rule-item-actions">
    <button class="btn-icon" title="复制"
            onclick="event.stopPropagation(); copyRuleSet('{{ rs.name }}')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
    </button>
    <a href="/config/rule-sets/{{ rs.name }}/export" class="btn-icon" title="导出">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
    </a>
    <button class="btn-icon btn-icon--danger" title="删除"
            onclick="event.stopPropagation(); if(confirm('确认删除规则集「{{ rs.display_name }}」？')){fetch('/config/rule-sets/{{ rs.name }}/delete',{method:'POST'}).then(function(){location.reload()})}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    </button>
  </div>
</div>
{% else %}
<div class="empty-state">暂无规则集</div>
{% endfor %}

<!-- 新建规则集对话框 -->
<div id="new-rule-dialog" class="dialog-overlay" onclick="if(event.target===this)hideNewRuleSetDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-title">新建规则集</div>
    <form id="new-rule-form" class="mb-4">
      <div class="form-group mb-4">
        <label class="field-label">标识</label>
        <input name="name" required pattern="[a-zA-Z0-9_-]+" placeholder="my-rules" class="input">
      </div>
      <div class="form-group">
        <label class="field-label">显示名称</label>
        <input name="display_name" required placeholder="我的规则集" class="input">
      </div>
    </form>
    <div id="new-rule-status"></div>
    <div class="dialog-actions">
      <button type="button" onclick="hideNewRuleSetDialog()" class="btn-cancel">取消</button>
      <button type="button" onclick="submitNewRuleSet()" class="btn-primary">创建</button>
    </div>
  </div>
</div>

<!-- 导入对话框 -->
<div id="import-dialog" class="dialog-overlay" onclick="if(event.target===this)hideImportDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-title">从 Markdown 导入规则</div>
    <p class="dialog-hint">支持格式：## R01: 规则名称 + **描述** / **检测逻辑** / **严重程度**</p>
    <form id="import-form" enctype="multipart/form-data">
      <div class="form-group mb-4">
        <label class="field-label">规则集标识</label>
        <input name="name" required pattern="[a-zA-Z0-9_-]+" placeholder="my-rules" class="input">
      </div>
      <div class="form-group mb-4">
        <label class="field-label">显示名称</label>
        <input name="display_name" required placeholder="我的规则集" class="input">
      </div>
      <div class="form-group">
        <label class="field-label">选择 Markdown 文件</label>
        <input type="file" name="file" accept=".md,.markdown,.txt" required class="input" style="padding:8px 10px;">
      </div>
      <div id="import-status" class="mt-3"></div>
      <div class="dialog-actions">
        <button type="button" onclick="hideImportDialog()" class="btn-cancel">取消</button>
        <button type="button" onclick="submitImport()" class="btn-primary">导入</button>
      </div>
    </form>
  </div>
</div>

<script>
function showNewRuleSetDialog() { document.getElementById('new-rule-dialog').classList.add('show'); }
function hideNewRuleSetDialog() { document.getElementById('new-rule-dialog').classList.remove('show'); }
function submitNewRuleSet() {
  var form = document.getElementById('new-rule-form');
  var data = new FormData(form);
  fetch('/config/rule-sets/create', {method:'POST', body:data})
    .then(function(r){return r.text()})
    .then(function(msg){
      document.getElementById('new-rule-status').innerHTML = msg;
      if (msg.includes('已创建')) { setTimeout(function(){ location.reload(); }, 800); }
    });
}
function showImportDialog() { document.getElementById('import-dialog').classList.add('show'); }
function hideImportDialog() { document.getElementById('import-dialog').classList.remove('show'); }
function submitImport() {
  var form = document.getElementById('import-form');
  var data = new FormData(form);
  fetch('/config/rule-sets/import', {method:'POST', body:data})
    .then(function(r){return r.text()})
    .then(function(msg){
      document.getElementById('import-status').innerHTML = msg;
      if (msg.includes('已导入')) { setTimeout(function(){ location.reload(); }, 800); }
    });
}
function copyRuleSet(name) {
  var target = prompt('输入新规则集名称：', name + '-copy');
  if (!target) return;
  var data = new FormData();
  data.append('target', target);
  fetch('/config/rule-sets/' + name + '/copy', {method:'POST', body:data})
    .then(function(r){return r.text()})
    .then(function(msg){
      if (msg.includes('已复制')) { location.reload(); }
      else { alert(msg.replace(/<[^>]*>/g, '')); }
    });
}
function closeEditor() {
  var editor = document.getElementById('rule-editor');
  if (editor) editor.innerHTML = '';
}
</script>
