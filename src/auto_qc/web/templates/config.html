{% extends "base.html" %}
{% block title %}配置 — Auto-QC{% endblock %}
{% block content %}

{% if saved %}
<div class="alert-success">
  <span>✓</span> 配置已保存
</div>
{% endif %}

<!-- LLM 配置 -->
<div class="card mb-5">
  <div class="section-title">
    <span>LLM 配置</span>
    <button type="submit" form="llm-form" class="btn-save">保存</button>
  </div>
  <form id="llm-form" method="post" action="/config/save-llm">
    <div class="form-grid">
      <div class="form-group">
        <label class="field-label" for="base_url">接口地址</label>
        <input id="base_url" name="base_url" value="{{ config.LLM_BASE_URL }}" class="input">
      </div>
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <label class="field-label" for="api_key" style="margin-bottom:0;">API Key</label>
          <span class="key-status {% if config.LLM_API_KEY != '****' %}key-status--set{% else %}key-status--unset{% endif %}">
            <span class="key-dot {% if config.LLM_API_KEY != '****' %}key-dot--set{% else %}key-dot--unset{% endif %}"></span>
            {% if config.LLM_API_KEY != '****' %}已设置{% else %}未配置{% endif %}
          </span>
        </div>
        <input id="api_key" name="api_key" type="password" value="{{ config.LLM_API_KEY }}" placeholder="输入新 Key 以更新" class="input" style="margin-top:6px;">
      </div>
      <div class="form-group">
        <label class="field-label" for="model">模型</label>
        <input id="model" name="model" value="{{ config.LLM_MODEL }}" placeholder="deepseek-v4-flash" class="input">
      </div>
    </div>
  </form>
</div>

<!-- 规则管理 -->
<div class="card">
  <div class="section-title mb-4">
    <span>规则管理</span>
  </div>
  <div id="rule-sets-list" hx-get="/config/rule-sets" hx-trigger="load" hx-swap="innerHTML">
    <div class="empty-state">加载规则集...</div>
  </div>
  <div id="rule-editor" class="mt-4"></div>
</div>

{% endblock %}
