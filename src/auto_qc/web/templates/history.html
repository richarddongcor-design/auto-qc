{% extends "base.html" %}
{% block title %}历史 — Auto-QC{% endblock %}
{% block content %}

<div class="card">
  <div class="page-header">
    <div>
      <span class="page-title">运行历史</span>
      <span class="page-subtitle">质检 + 问题挖掘</span>
    </div>
    <div class="filter-group" id="history-filters">
      <button class="filter-btn active"
              hx-get="/history/list?type=all" hx-target="#history-content" hx-swap="innerHTML"
              onclick="setFilter(this)">全部</button>
      <button class="filter-btn"
              hx-get="/history/list?type=qc" hx-target="#history-content" hx-swap="innerHTML"
              onclick="setFilter(this)">质检</button>
      <button class="filter-btn"
              hx-get="/history/list?type=pi" hx-target="#history-content" hx-swap="innerHTML"
              onclick="setFilter(this)">问题挖掘</button>
    </div>
  </div>
  <div id="history-content" hx-get="/history/list?type=all" hx-trigger="load" hx-swap="innerHTML">
    <div class="empty-state">加载中...</div>
  </div>
</div>

<script>
function setFilter(btn){
  document.querySelectorAll('#history-filters .filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}
</script>

{% endblock %}
