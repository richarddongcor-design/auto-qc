{% extends "base.html" %}
{% block title %}问题挖掘 — Auto-QC{% endblock %}
{% block content %}

<div class="card">
  <form id="pi-form" hx-post="/pi/start" hx-target="#result-area" hx-swap="innerHTML"
        enctype="multipart/form-data">

    <div class="toolbar">

      <!-- 领域 -->
      <div class="field field--sm">
        <span class="field-label">领域</span>
        <div class="custom-select">
          <select name="domain" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">
            <option value="recruitment">招聘外呼</option>
          </select>
          <div class="custom-select__trigger">
            <span class="custom-select__value">招聘外呼</span>
            <svg class="custom-select__arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="custom-select__list">
            <div class="custom-select__option selected" data-value="recruitment">招聘外呼</div>
          </div>
        </div>
      </div>

      <!-- 文件 -->
      <div class="field field--md">
        <span class="field-label">待挖掘文件</span>
        <div class="file-row">
          <button type="button" class="btn-file" onclick="document.getElementById('pi-file-input').click()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            选择文件
          </button>
          <span class="file-name" id="pi-file-label">未选择文件</span>
          <input id="pi-file-input" type="file" name="file" accept=".xlsx" style="display:none" required onchange="piHandleFile(this)">
        </div>
      </div>

      <!-- 提交 -->
      <button type="submit" class="btn-go">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        开始挖掘
      </button>

    </div>

  </form>
</div>

<script>
function piHandleFile(input) {
  var label = document.getElementById('pi-file-label');
  if (input.files && input.files[0]) {
    label.textContent = input.files[0].name;
    label.classList.add('has-file');
  } else {
    label.textContent = '未选择文件';
    label.classList.remove('has-file');
  }
}
</script>

<div class="result-area" id="result-area"></div>
{% endblock %}
