{% extends "base.html" %}
{% block title %}问题挖掘 — Auto-QC{% endblock %}
{% block content %}

<div class="card p-8 mb-5">
  <form id="pi-form" hx-post="/pi/start" hx-target="#result-area" hx-swap="innerHTML"
        enctype="multipart/form-data">
    <div class="mb-6">
      <label class="text-xs font-medium text-gray-500 mb-2 block">领域</label>
      <select name="domain" class="max-w-xs">
        <option value="recruitment">招聘外呼</option>
      </select>
    </div>
    <div class="flex items-end gap-5">
      <div class="flex-1">
        <label class="text-xs font-medium text-gray-500 mb-2 block">待挖掘文件</label>
        <div id="pi-dropzone"
             class="border-2 border-dashed border-gray-200 rounded-xl py-5 px-6 text-center hover:border-amber-300 cursor-pointer transition-colors"
             onclick="document.getElementById('pi-file-input').click()">
          <div id="pi-dropzone-text" class="text-gray-400 text-sm">点击上传或拖拽 Excel 文件</div>
          <div id="pi-dropzone-hint" class="text-xs text-gray-300 mt-1">.xlsx</div>
        </div>
        <input id="pi-file-input" type="file" name="file" accept=".xlsx" class="hidden" required onchange="piHandleFile(this)">
      </div>
      <button type="submit" class="px-12 py-3 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 text-white text-base font-semibold rounded-xl transition-all cursor-pointer shadow-sm hover:shadow-md active:scale-[0.97] border border-amber-500 shrink-0">开始挖掘</button>
    </div>
  </form>
</div>

<script>
function piHandleFile(input) {
  if (input.files && input.files[0]) {
    document.getElementById('pi-dropzone-text').textContent = input.files[0].name;
    document.getElementById('pi-dropzone-hint').textContent = '✓ 已就绪';
    document.getElementById('pi-dropzone').className = 'border-2 border-amber-300 bg-amber-50/30 rounded-xl py-5 px-6 text-center cursor-pointer transition-colors';
  }
}
(function() {
  var dz = document.getElementById('pi-dropzone'); if(!dz)return;
  dz.addEventListener('dragover',function(e){e.preventDefault();this.className='border-2 border-amber-400 bg-amber-50/50 rounded-xl py-5 px-6 text-center cursor-pointer transition-colors';});
  dz.addEventListener('dragleave',function(e){e.preventDefault();if(!document.getElementById('pi-file-input').files[0]){this.className='border-2 border-dashed border-gray-200 rounded-xl py-5 px-6 text-center hover:border-amber-300 cursor-pointer transition-colors';}});
  dz.addEventListener('drop',function(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f){document.getElementById('pi-file-input').files=e.dataTransfer.files;piHandleFile(document.getElementById('pi-file-input'));}});
})();
</script>

<div id="result-area"></div>
{% endblock %}
